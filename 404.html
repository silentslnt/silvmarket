  'bf':            'bf',
  'blox-fruits':   'bf',
  'brainrot':      'brainrot',
  'rivals':        'rivals',
  'mm2':           'mm2',
  'murder-mystery':'mm2',
  'tsunami':       'tsunami',
  'sp':            'sp',

  'bb':            'bb',
  'av':            'av',
  'bl':            'bl',
  'bloodlines':    'bl',
  'ps99':          'ps99',
  'pet-simulator': 'ps99',

};
var PAGE_MAP = {
  'how-to-order': '/tutorial',
  'guide':        '/tutorial',
};

  window.location.replace('/game?g=' + GAME_MAP[path]);
} else if (PAGE_MAP[path]) {
  window.location.replace(PAGE_MAP[path]);
} else {
  window.location.replace('/');
}
