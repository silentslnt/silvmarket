<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Silv Market</title>
<link rel="icon" href="https://silvmarket.shop/images/silvmarket%20logo.png"/>
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Silv Market"/>
<meta property="og:title" content="Silv Market"/>
<meta property="og:description" content="Premium Roblox items at the best prices. Instant delivery via Discord."/>
<meta property="og:image" content="https://silvmarket.shop/images/silvmarket%20logo.png?v=2"/>
<meta name="twitter:card" content="summary"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07031a;--card:rgba(16,6,38,0.92);
  --purple:#9333ea;--purple2:#6d28d9;
  --pink:#ff10f0;--pink2:#e879f9;
  --yellow:#ffd700;--yellow2:#fbbf24;
  --blue:#3b82f6;--green:#22c55e;--red:#ef4444;
  --dim:rgba(255,255,255,0.7);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;overflow-x:hidden;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── HERO ──────────────────────────────────────────── */
.hero{position:relative;height:320px;overflow:hidden;display:flex;align-items:flex-end}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.45) saturate(1.2);transition:opacity .5s}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(7,3,26,.6) 40%,rgba(7,3,26,.3) 100%)}
.hero-content{position:relative;z-index:2;padding:0 40px 36px;width:100%;max-width:1400px;margin:0 auto}
.hero-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.45);margin-bottom:14px;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.5px}
.hero-breadcrumb a{transition:color .15s}
.hero-breadcrumb a:hover{color:rgba(255,255,255,.8)}
.hero-breadcrumb svg{opacity:.4}
.hero-title-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hero-icon{width:56px;height:56px;border-radius:14px;object-fit:cover;border:2px solid rgba(255,255,255,.12);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.hero-title{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,#fff 0%,var(--yellow) 50%,var(--pink) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-family:'Rajdhani',sans-serif;font-size:14px;color:rgba(255,255,255,.5);margin-top:8px;max-width:600px;line-height:1.5}
.hero-stats{display:flex;gap:20px;margin-top:14px}
.hero-stat{display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.5px}
.hero-stat svg{opacity:.5}

/* ── NAV ───────────────────────────────────────────── */
.topbar{height:58px;background:rgba(3,1,10,.96);backdrop-filter:blur(22px);border-bottom:1px solid rgba(147,51,234,.18);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100}
.tb-logo{display:flex;align-items:center;gap:10px;font-family:'Orbitron',monospace;font-size:15px;font-weight:800;letter-spacing:1.5px;color:#fff}
.tb-logo img{width:28px;height:28px;border-radius:6px}
.tb-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.tb-cart{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);cursor:pointer;transition:color .15s;padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03)}
.tb-cart:hover{color:#fff;border-color:rgba(147,51,234,.3)}
.tb-cart .cart-count{background:var(--pink);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.tb-back{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);transition:all .15s;padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);cursor:pointer}
.tb-back:hover{color:#fff;border-color:rgba(147,51,234,.3)}

/* ── TOOLBAR ───────────────────────────────────────── */
.toolbar{position:sticky;top:58px;z-index:90;background:rgba(7,3,26,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(147,51,234,.1);padding:14px 0}
.toolbar-inner{max-width:1400px;margin:0 auto;padding:0 40px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.filter-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex:1;min-width:0}
.filter-tabs::-webkit-scrollbar{display:none}
.ft{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
  color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.ft:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.15)}
.ft.active{background:rgba(147,51,234,.15);border-color:rgba(147,51,234,.4);color:var(--purple)}
.tb-search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:0 12px;height:36px;min-width:200px;transition:border-color .15s}
.tb-search:focus-within{border-color:rgba(147,51,234,.4)}
.tb-search svg{flex-shrink:0;opacity:.35}
.tb-search input{background:none;border:none;outline:none;color:#fff;font-size:13px;font-family:'Inter',sans-serif;width:100%}
.tb-search input::placeholder{color:rgba(255,255,255,.3)}
.tb-sort{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;color:rgba(255,255,255,.5);padding:7px 12px;cursor:pointer;transition:all .15s;appearance:none;outline:none}
.tb-sort:hover,.tb-sort:focus{border-color:rgba(147,51,234,.3);color:rgba(255,255,255,.7)}
.tb-sort option{background:#1a0a2e;color:#fff}

/* ── GRID ──────────────────────────────────────────── */
.main{max-width:1400px;margin:0 auto;padding:28px 40px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.grid-empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:rgba(255,255,255,.3);font-family:'Rajdhani',sans-serif;font-size:16px}

/* ── CARD ──────────────────────────────────────────── */
.pc{position:relative;background:var(--card);border:1px solid rgba(255,255,255,.07);
  border-radius:17px;overflow:hidden;transition:all .3s;cursor:pointer}
.pc:hover{transform:translateY(-4px);border-color:rgba(147,51,234,.3);box-shadow:0 12px 40px rgba(147,51,234,.15)}
.pc-img{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.pc:hover .pc-img img{transform:scale(1.06)}
.r-common{background:linear-gradient(150deg,#111a11,#0a0f0a)}
.r-uncommon{background:linear-gradient(150deg,#132208,#0c1a04)}
.r-rare{background:linear-gradient(150deg,#05143a,#020c28)}
.r-legendary{background:linear-gradient(150deg,#251500,#170d00)}
.r-mythical{background:linear-gradient(150deg,#1f0038,#130023)}
.r-robux{background:linear-gradient(150deg,#1f1500,#120d00)}
.pc-body{padding:13px}
.pc-g{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.pc-n{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-rar{font-size:10px;font-weight:600;margin-bottom:7px;font-family:'Rajdhani',sans-serif;letter-spacing:.5px}
.rc-common{color:rgba(255,255,255,.3)}.rc-uncommon{color:#86efac}.rc-rare{color:#60a5fa}
.rc-legendary{color:#fbbf24}.rc-mythical{color:#f0abfc}
.pc-price{font-family:'Orbitron',monospace;font-size:17px;font-weight:700;color:var(--yellow);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.pc-old{font-size:11px;text-decoration:line-through;color:rgba(255,255,255,.25);font-weight:400}
.pc-btn{width:100%;padding:9px;border-radius:9px;
  background:linear-gradient(135deg,rgba(147,51,234,.22),rgba(255,16,240,.14));
  border:1px solid rgba(147,51,234,.3);color:#fff;font-family:'Rajdhani',sans-serif;font-size:12px;
  font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px}
.pc-btn:hover{background:linear-gradient(135deg,rgba(147,51,234,.35),rgba(255,16,240,.25));border-color:rgba(255,16,240,.5)}
.pc-btn.oos{opacity:.4;cursor:not-allowed}
.pc-btn svg{flex-shrink:0}

/* Badges */
.pbadge{position:absolute;top:9px;right:9px;z-index:3;
  font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:5px}
.b-hot{background:linear-gradient(135deg,#ff0040,#ff5500);color:#fff;box-shadow:0 0 8px rgba(255,0,64,.4)}
.b-new{background:linear-gradient(135deg,#1565c0,var(--blue));color:#fff}
.b-best{background:linear-gradient(135deg,#ff6d00,#ff0040);color:#fff;box-shadow:0 0 8px rgba(255,109,0,.4)}
.b-myth{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.b-leg{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff}
.b-sale{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff}
.b-oos{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4)}
.b-rare{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff}
.b-perm{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.pc-sale-sticker{position:absolute;bottom:8px;left:8px;background:linear-gradient(135deg,#ff10f0,#9333ea);color:#fff;font-family:'Orbitron',monospace;font-size:7px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:1.5px;z-index:3;box-shadow:0 2px 10px rgba(255,16,240,.5);text-transform:uppercase;pointer-events:none}

/* Fav button */
.fav-btn{position:absolute;top:8px;left:8px;z-index:20;width:28px;height:28px;border-radius:50%;background:rgba(7,3,26,.7);border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .15s;flex-shrink:0}
.fav-btn:hover{background:rgba(255,40,80,.35);border-color:rgba(255,60,100,.6);transform:scale(1.15)}
.fav-btn.active{background:rgba(255,30,80,.2);border-color:rgba(255,80,100,.5)}

/* Stock badge */
.stock-badge{position:absolute;top:9px;left:9px;z-index:3;
  font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;
  padding:3px 8px;border-radius:5px;text-transform:uppercase;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px)}
.stock-ok{color:#4ade80}.stock-low{color:#fbbf24}

/* Game colors */
.g-bf{color:#f59e0b}.g-am{color:#ec4899}.g-mm2{color:#60a5fa}.g-br{color:#c084fc}
.g-gag{color:#4ade80}.g-rob{color:#fbbf24}.g-riv{color:#f87171}.g-99{color:#a78bfa}.g-tsn{color:#38bdf8}
.g-gpo{color:#f59e0b}.g-sp{color:#60a5fa}.g-bb{color:#f87171}.g-av{color:#818cf8}.g-bl{color:#ef4444}
.g-fisch{color:#38bdf8}.g-bss{color:#fbbf24}.g-vbl{color:#a78bfa}.g-dth{color:#ef4444}
.g-ps99{color:#06b6d4}.g-bw{color:#d97706}.g-brainrot{color:#c084fc}
.g-robux{color:#fbbf24}.g-discord{color:#5865f2}

/* Animated glow for hot/best */
@keyframes item-glow{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 18px rgba(255,16,240,.18)}}
.pc:has(.b-hot),.pc:has(.b-best){animation:item-glow 2.4s ease-in-out infinite}
@keyframes shimmer-move{to{background-position:200% center}}
.b-hot{background-image:linear-gradient(135deg,#ff6d00 0%,#ff0040 50%,#ff6d00 100%)!important;background-size:200% auto!important;animation:shimmer-move 2s linear infinite!important}
.b-best{background-image:linear-gradient(135deg,#ff6d00 0%,#ff0040 50%,#ff8800 100%)!important;background-size:200% auto!important;animation:shimmer-move 2.2s linear infinite!important}

/* Price gradient */
.pc-price{
  background:linear-gradient(120deg,var(--yellow) 0%,#ffa040 40%,var(--pink) 70%,var(--purple) 100%)!important;
  -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
  background-clip:text!important;background-size:200% auto;animation:shimmer-move 3s linear infinite}

/* ── ITEM DETAIL MODAL ─────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:linear-gradient(160deg,rgba(16,6,38,.98),rgba(7,3,26,.99));border:1px solid rgba(147,51,234,.2);
  border-radius:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,.6)}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;z-index:5;color:rgba(255,255,255,.5)}
.modal-close:hover{background:rgba(255,255,255,.12);color:#fff}
.modal-img{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border-radius:20px 20px 0 0}
.modal-img img{width:100%;height:100%;object-fit:cover}
.modal-body{padding:24px}
.modal-game{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.modal-name{font-family:'Orbitron',monospace;font-size:22px;font-weight:800;margin-bottom:6px;line-height:1.2}
.modal-rar{margin-bottom:10px}
.modal-rar span{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;display:inline-block}
.modal-price{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--yellow);margin-bottom:4px}
.modal-old-price{font-family:'Rajdhani',sans-serif;font-size:14px;color:rgba(255,255,255,.3);text-decoration:line-through;margin-bottom:10px}
.modal-desc{font-family:'Rajdhani',sans-serif;font-size:13px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:16px;padding:14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.05)}
.modal-stock{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.modal-qty{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.modal-qty button{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-qty button:hover{background:rgba(147,51,234,.2);border-color:rgba(147,51,234,.4)}
.modal-qty span{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;min-width:30px;text-align:center}
.modal-add{width:100%;padding:14px;border-radius:12px;
  background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.modal-add:hover{filter:brightness(1.1);transform:translateY(-1px)}
.modal-add:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none}

/* ── CART SIDEBAR ──────────────────────────────────── */
.cart-overlay{display:none;position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.6)}
.cart-overlay.open{display:block}
.cart-sb{position:fixed;top:0;right:-420px;width:400px;max-width:90vw;height:100vh;background:rgba(7,3,26,.98);
  border-left:1px solid rgba(147,51,234,.2);z-index:251;transition:right .3s;overflow-y:auto;
  display:flex;flex-direction:column;backdrop-filter:blur(20px)}
.cart-sb.open{right:0}
.cart-hd{padding:20px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between}
.cart-hd h3{font-family:'Orbitron',monospace;font-size:16px;font-weight:800;letter-spacing:1px}
.cart-close{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cart-close:hover{background:rgba(255,255,255,.12);color:#fff}
.cart-items{flex:1;overflow-y:auto;padding:16px 20px}
.cart-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.cart-item-img{width:48px;height:48px;border-radius:8px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.04)}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-game{font-family:'Rajdhani',sans-serif;font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
.cart-item-price{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--yellow);margin-top:4px}
.cart-item-qty{display:flex;align-items:center;gap:6px;margin-top:6px}
.cart-item-qty button{width:22px;height:22px;border-radius:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cart-item-qty span{font-size:12px;font-weight:600;min-width:16px;text-align:center}
.cart-item-remove{align-self:flex-start;width:24px;height:24px;border-radius:6px;background:none;border:none;
  color:rgba(255,255,255,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s;flex-shrink:0}
.cart-item-remove:hover{color:var(--red)}
.cart-footer{padding:20px;border-top:1px solid rgba(255,255,255,.06)}
.cart-row{display:flex;justify-content:space-between;font-family:'Rajdhani',sans-serif;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:6px}
.cart-row.total{font-size:16px;font-weight:700;color:#fff;margin-top:8px}
.cart-row.total span:last-child{color:var(--yellow);font-family:'Orbitron',monospace}
.cart-checkout{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--pink));
  border:none;color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.cart-checkout:hover{filter:brightness(1.1)}
.cart-empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.25);font-family:'Rajdhani',sans-serif;font-size:14px}

/* ── TOAST ─────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(16,6,38,.95);border:1px solid rgba(147,51,234,.3);border-radius:10px;
  padding:10px 20px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:#fff;
  z-index:300;opacity:0;transition:all .3s;pointer-events:none;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RELATED GAMES ─────────────────────────────────── */
.related{max-width:1400px;margin:0 auto;padding:0 40px 60px}
.related h3{font-family:'Orbitron',monospace;font-size:16px;font-weight:800;letter-spacing:1px;margin-bottom:20px;color:rgba(255,255,255,.7)}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.rel-card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s}
.rel-card:hover{border-color:rgba(147,51,234,.3);transform:translateY(-3px)}

function isFav(name){ return getFavs().includes(name); }
function toggleFav(name, btn){
  let favs = getFavs();
  const idx = favs.indexOf(name);
  if(idx >= 0) favs.splice(idx, 1); else favs.push(name);
  localStorage.setItem('silv_favs', JSON.stringify(favs));
  if(btn){
    const active = favs.includes(name);
    btn.classList.toggle('active', active);
    const svg = btn.querySelector('svg');
    if(svg){ svg.setAttribute('fill', active ? '#ff3860' : 'none'); svg.setAttribute('stroke', active ? '#ff3860' : 'rgba(255,255,255,.85)'); }

  document.title = cfg.name + ' — Silv Market | Buy Roblox Items';
  document.querySelector('meta[property="og:title"]').content = cfg.name + ' — Silv Market';
  document.querySelector('meta[property="og:description"]').content = cfg.desc;

  // Hero
  const heroBg = document.getElementById('heroBg');
  if(cfg.wall) heroBg.style.backgroundImage = 'url(' + cfg.wall + ')';
  else if(cfg.img) heroBg.style.backgroundImage = 'url(' + cfg.img + ')';
  document.getElementById('heroBreadcrumb').textContent = cfg.name;
  document.getElementById('heroIcon').src = cfg.img || SITE_LOGO;
  document.getElementById('heroTitle').textContent = cfg.name;
  document.getElementById('heroDesc').textContent = cfg.desc;

  // Filter tabs
  renderFilters(cfg.filters);

  // Fetch items
  fetchItems();

  // Related games
  renderRelated();

  // Update cart UI
  updateCartUI();
})();

function renderFilters(filters){
  const tabs = document.getElementById('filterTabs');
  tabs.innerHTML = filters.map(function(f){
    const label = f === 'all' ? 'All Items' : f.replace(/-/g, ' ').replace(/\b\w/g, function(l){ return l.toUpperCase(); });
    return '<button class="ft' + (f === 'all' ? ' active' : '') + '" data-filter="' + f + '" onclick="setFilter(\'' + f + '\',this)">' + label + '</button>';
  }).join('');
}

function fetchItems(){
  const rawItems = getGameItems(currentGame);
  // Normalize items — BF fruits use norm/perm pricing, others use p
  allItems = rawItems.map(function(i){
    var item = Object.assign({}, i);
    // Normalize price: use p, or norm, or first speed price
    if(!item.p && item.norm) item.p = item.norm;
    if(!item.p && item.speeds && item.speeds.length) item.p = item.speeds[0].p;
    // Normalize sub/cat
    if(!item.sub && item.cat) item.sub = item.cat;
    if(!item.sub && item.rar) item.sub = item.rar;
    return item;
  });
  document.getElementById('heroItemCount').textContent = allItems.length + ' item' + (allItems.length !== 1 ? 's' : '');
  filterItems();
}

function setFilter(val, btn){
  activeFilter = val;
  document.querySelectorAll('.ft').forEach(function(b){ b.classList.remove('active'); });
  if(btn) btn.classList.add('active');
  filterItems();
}

function filterItems(){
  const search = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;

  filteredItems = allItems.filter(function(i){
    // Filter
    if(activeFilter !== 'all'){
      const sub = (i.sub || i.cat || i.rar || '').toLowerCase();
      if(sub !== activeFilter) return false;
    }
    // Search
    if(search && (i.n || '').toLowerCase().indexOf(search) === -1) return false;
    return true;
  });

  // Sort
  if(sort === 'price-asc') filteredItems.sort(function(a,b){ return (a.p||0) - (b.p||0); });
  else if(sort === 'price-desc') filteredItems.sort(function(a,b){ return (b.p||0) - (a.p||0); });
  else if(sort === 'name-asc') filteredItems.sort(function(a,b){ return (a.n||'').localeCompare(b.n||''); });
  else if(sort === 'name-desc') filteredItems.sort(function(a,b){ return (b.n||'').localeCompare(a.n||''); });

  renderGrid();
}

function renderGrid(){
  const grid = document.getElementById('itemGrid');
  if(!filteredItems.length){
    grid.innerHTML = '<div class="grid-empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg><div style="margin-top:12px">No items found</div></div>';
    return;
  }
  const cfg = GAMES[currentGame];
  grid.innerHTML = filteredItems.map(function(i){ return mkCard(i, cfg); }).join('');
}

function mkCard(i, cfg){
  const bg = i.bg || 'r-rare';
  const price = Number(i.p || i.price || i.norm || 0);
  const ps = '$' + price.toFixed(2);
  const gameIcon = cfg.img || '';
  const imgSrc = i.img || gameIcon;
  const rarCls = i.rar ? 'rb-' + i.rar : 'rb-common';
  const favActive = isFav(i.n) ? ' active' : '';
  const favFill = favActive ? '#ff3860' : 'none';
  const favStroke = favActive ? '#ff3860' : 'rgba(255,255,255,.85)';
  const safeN = (i.n || '').replace(/\\/g,'\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');

  var imgHtml;
  if(imgSrc){
    imgHtml = '<img src="' + imgSrc + '" alt="' + (i.n||'').replace(/"/g,'&quot;') + '" loading="lazy" onerror="this.style.opacity=\'0\'">';
  } else {
    imgHtml = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.3"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/></svg></div>';
  }

  var badgeHtml = '';
  if(i.badge && BADGE_CLS[i.badge]){
    badgeHtml = '<div class="pbadge ' + BADGE_CLS[i.badge] + '">' + (BADGE_LBL[i.badge] || i.badge.toUpperCase()) + '</div>';
  }

  var stockHtml = '';
  if(currentGame === 'brainrot' && i.stock !== undefined && i.stock !== null && i.stock > 0){
    if(i.stock >= 20) stockHtml = '<div class="stock-badge stock-ok">IN STOCK</div>';
    else if(i.stock <= 5) stockHtml = '<div class="stock-badge stock-low">' + i.stock + ' LEFT</div>';
    else stockHtml = '<div class="stock-badge stock-ok">' + i.stock + ' LEFT</div>';
  }

  var oldPriceHtml = '';
  if(i.oldP) oldPriceHtml = ' <span class="pc-old">$' + Number(i.oldP).toFixed(2) + '</span>';

  var rarHtml = '';
  if(i.rar && RAR_LBL[i.rar]){
    rarHtml = '<div class="pc-rar ' + (RAR_COL[i.rar] || 'rc-rare') + '">' + RAR_LBL[i.rar] + '</div>';
  }

  var oosBtn = i.oos || i.stock === 0;

  return '<div class="pc ' + rarCls + '" data-sub="' + (i.sub||i.cat||'') + '" data-rar="' + (i.rar||'') + '" data-price="' + price + '" style="cursor:pointer" onclick="if(!event.target.closest(\'.fav-btn\')&&!event.target.closest(\'.pc-btn\'))openModal(\'' + safeN + '\')">'
    + '<div class="pc-img ' + bg + '">'
    + imgHtml
    + badgeHtml
    + stockHtml
    + '<button class="fav-btn' + favActive + '" onclick="event.stopPropagation();toggleFav(\'' + safeN + '\',this)" title="Save to favourites"><svg width="14" height="14" viewBox="0 0 24 24" fill="' + favFill + '" stroke="' + favStroke + '" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>'
    + '</div>'
    + '<div class="pc-body">'
    + '<div class="pc-g ' + cfg.cls + '">' + cfg.name + '</div>'
    + '<div class="pc-n">' + (i.n||'') + '</div>'
    + rarHtml
    + '<div class="pc-price">' + ps + oldPriceHtml + '</div>'
    + (oosBtn
      ? '<button class="pc-btn oos" disabled onclick="event.stopPropagation()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Out of Stock</button>'
      : '<button class="pc-btn" onclick="event.stopPropagation();addToCart(\'' + safeN + '\',' + price + ',\'' + cfg.name + '\',\'' + (imgSrc||'').replace(/'/g,"\\'") + '\')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Add to Cart</button>')
    + '</div></div>';
}

// ── MODAL ────────────────────────────────────────────
function openModal(name){
  const i = allItems.find(function(x){ return x.n === name; });
  if(!i) return;
  modalItem = i;
  modalQty = 1;

  const cfg = GAMES[currentGame];
  const imgSrc = i.img || cfg.img || '';
  const modalImgEl = document.getElementById('modalImg');
  if(imgSrc){
    modalImgEl.innerHTML = '<img src="' + imgSrc + '" alt="' + (i.n||'') + '" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\'">';
  } else {
    modalImgEl.innerHTML = '<div class="' + (i.bg||'r-rare') + '" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center"><svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/></svg></div>';
  }

  const gameEl = document.getElementById('modalGame');
  gameEl.textContent = cfg.name;
  gameEl.className = 'modal-game ' + cfg.cls;
  document.getElementById('modalName').textContent = i.n;

  const rarEl = document.getElementById('modalRar');
  if(i.rar && RAR_LBL[i.rar]){
    rarEl.innerHTML = '<span class="' + (RAR_COL[i.rar]||'rc-rare') + '" style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;background:rgba(255,255,255,.06)">' + RAR_LBL[i.rar] + '</span>';
  } else { rarEl.innerHTML = ''; }

  const price = Number(i.p || i.price || i.norm || 0);
  document.getElementById('modalPrice').textContent = '$' + price.toFixed(2);

  const oldPEl = document.getElementById('modalOldPrice');
  if(i.oldP) oldPEl.innerHTML = '<div class="modal-old-price">Was $' + Number(i.oldP).toFixed(2) + '</div>';
  else oldPEl.innerHTML = '';

  const desc = DESCRIPTIONS[cfg.name] || ('Premium ' + cfg.name + ' item. Delivered instantly via our Discord server after payment.');
  document.getElementById('modalDesc').innerHTML = '<strong style="color:rgba(255,255,255,.7)">Description</strong><br><span style="color:rgba(255,255,255,.5)">' + desc + '</span>';

  const stockEl = document.getElementById('modalStock');
  const stock = i.stock !== undefined ? i.stock : 99;
  if(stock === 0){
    stockEl.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ff4466" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> <span style="color:#ff4466">Out of Stock</span>';
  } else if(stock <= 5){
    stockEl.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ff9900" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> <span style="color:#ff9900">Only ' + stock + ' left in stock!</span>';
  } else {
    stockEl.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00c853" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> <span style="color:#00c853">In Stock (' + stock + ')</span>';
  }

  document.getElementById('modalQty').textContent = '1';

  const addBtn = document.getElementById('modalAddBtn');
  if(stock === 0){
    addBtn.disabled = true;
    addBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Out of Stock';
  } else {
    addBtn.disabled = false;
    addBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Add to Cart';
  }

  document.getElementById('itemModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('itemModal').classList.remove('open');
  document.body.style.overflow = '';
  modalItem = null;
  modalQty = 1;
}

function changeQty(delta){
  const max = modalItem?.stock ?? 99;
  modalQty = Math.max(1, Math.min(max || 99, modalQty + delta));
  document.getElementById('modalQty').textContent = modalQty;
  const price = Number(modalItem?.p || modalItem?.price || modalItem?.norm || 0);
  document.getElementById('modalPrice').textContent = '$' + (price * modalQty).toFixed(2);
}

function addToCartFromModal(){
  if(!modalItem) return;
  const cfg = GAMES[currentGame];
  const price = Number(modalItem.p || modalItem.price || modalItem.norm || 0);
  const imgSrc = modalItem.img || cfg.img || '';
  for(var q = 0; q < modalQty; q++){
    addToCart(modalItem.n, price, cfg.name, imgSrc);
  }
  closeModal();
}

// ── CART ──────────────────────────────────────────────
function addToCart(name, price, game, img){
  if(!name || isNaN(price) || price <= 0) return;
  const ex = cart.find(function(c){ return c.name === name; });
  if(ex) ex.qty++;
  else cart.push({ name:name, price:price, em:'', game:game, qty:1, img:img||null });
  saveCart();
  updateCartUI();
  openCart();
  showToast(name + ' added to cart');
}

function removeFromCart(name){
  cart = cart.filter(function(c){ return c.name !== name; });
  saveCart();
  updateCartUI();
}

function changeCartQty(name, delta){
  const item = cart.find(function(c){ return c.name === name; });
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) cart = cart.filter(function(c){ return c.name !== name; });
  saveCart();
  updateCartUI();
}

function saveCart(){
  localStorage.setItem('silv_cart', JSON.stringify(cart));
}

function updateCartUI(){
  const cnt = cart.reduce(function(s,i){ return s + i.qty; }, 0);
  document.getElementById('cartCount').textContent = cnt;

  const itemsEl = document.getElementById('cartItems');
  const footerEl = document.getElementById('cartFooter');

  if(!cnt){
    itemsEl.innerHTML = '<div class="cart-empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><div style="margin-top:12px">Your cart is empty</div></div>';
    footerEl.innerHTML = '';
    return;
  }

  itemsEl.innerHTML = cart.map(function(c){
    var safeN = c.name.replace(/\\/g,'\\\\').replace(/'/g, "\\'");
    var imgHtml = c.img
      ? '<img src="' + c.img + '" alt="" onerror="this.style.display=\'none\'">'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.5" style="margin:auto"><rect x="2" y="7" width="20" height="14" rx="2"/></svg>';
    return '<div class="cart-item">'
      + '<div class="cart-item-img">' + imgHtml + '</div>'
      + '<div class="cart-item-info">'
      + '<div class="cart-item-name">' + c.name + '</div>'
      + '<div class="cart-item-game">' + (c.game||'') + '</div>'
      + '<div class="cart-item-price">$' + (c.price * c.qty).toFixed(2) + '</div>'
      + '<div class="cart-item-qty">'
      + '<button onclick="changeCartQty(\'' + safeN + '\',-1)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>'
      + '<span>' + c.qty + '</span>'
      + '<button onclick="changeCartQty(\'' + safeN + '\',1)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>'
      + '</div></div>'
      + '<button class="cart-item-remove" onclick="removeFromCart(\'' + safeN + '\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
      + '</div>';
  }).join('');

  const sub = cart.reduce(function(s,i){ return s + i.price * i.qty; }, 0);
  const fee = sub * 0.08;
  const total = sub + fee;
  footerEl.innerHTML = '<div class="cart-row"><span>Subtotal</span><span>$' + sub.toFixed(2) + '</span></div>'
    + '<div class="cart-row"><span>Service Fee (8%)</span><span>$' + fee.toFixed(2) + '</span></div>'
    + '<div class="cart-row total"><span>Total</span><span>$' + total.toFixed(2) + '</span></div>'
    + '<button class="cart-checkout" onclick="goToCheckout()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> Checkout</button>';
}

function toggleCart(){
  document.getElementById('cartOverlay').classList.toggle('open');
  document.getElementById('cartSB').classList.toggle('open');
}
function openCart(){
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartSB').classList.add('open');
}

function goToCheckout(){
  // Save cart for checkout page (both keys — main site uses silv_cart, checkout reads silv_checkout_cart)
  saveCart();
  try{ localStorage.setItem('silv_checkout_cart', JSON.stringify(cart)); }catch(e){}
  window.location.href = '/checkout';
}

// ── RELATED GAMES ────────────────────────────────────
function renderRelated(){
  const grid = document.getElementById('relatedGrid');
  const keys = Object.keys(GAMES).filter(function(k){ return k !== currentGame && k !== 'robux' && k !== 'discord'; });
  // Shuffle and pick 8
  for(var i = keys.length - 1; i > 0; i--){ var j = Math.floor(Math.random() * (i + 1)); var t = keys[i]; keys[i] = keys[j]; keys[j] = t; }
  var picks = keys.slice(0, 8);

  grid.innerHTML = picks.map(function(k){
    var g = GAMES[k];
    var wallUrl = g.wall || g.img || '';
    return '<a href="/game?g=' + k + '" class="rel-card">'
      + '<div class="rel-card-img"><img src="' + wallUrl + '" alt="' + g.name + '" onerror="this.style.display=\'none\'"></div>'
      + '<div class="rel-card-body"><div class="rel-card-name">' + g.name + '</div><div class="rel-card-count">Shop Now</div></div>'
      + '</a>';
  }).join('');
}

// ── TOAST ────────────────────────────────────────────
var _toastTimer;
function showToast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// Handle ?open= param to open item modal on load
(function checkOpenParam(){
  const params = new URLSearchParams(location.search);
  const name = params.get('open');
  if(!name) return;
  // Wait for items to load, then open
  var attempts = 0;
  var check = setInterval(function(){
    attempts++;
    if(attempts > 30){ clearInterval(check); return; }
    var item = allItems.find(function(i){ return i.n === name; });
    if(item){ clearInterval(check); openModal(name); }
  }, 200);
})();

// Keyboard
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    if(document.getElementById('itemModal').classList.contains('open')) closeModal();
    else if(document.getElementById('cartSB').classList.contains('open')) toggleCart();
  }
});
</script>
